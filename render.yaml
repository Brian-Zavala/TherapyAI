# Render Deployment Configuration
# For immediate testing deployment

services:
  # Web Service
  - type: web
    name: couple-therapy-test
    runtime: node
    plan: free # Start with free, upgrade to starter ($7) when needed
    
    # Build Configuration
    buildCommand: |
      npm ci
      npx prisma generate
      npm run build
    
    # Start Command
    startCommand: npm start
    
    # Health Check
    healthCheckPath: /api/health
    
    # Environment Variables (add these in Render dashboard)
    envVars:
      - key: NODE_ENV
        value: production
      
      - key: PORT
        value: 3000
        
      - key: HOSTNAME
        value: 0.0.0.0
      
      # These will be auto-generated by Render
      - key: RENDER_EXTERNAL_URL
        generateValue: true
      
      - key: RENDER_INTERNAL_URL
        generateValue: true
    
    # Auto-deploy from GitHub
    autoDeploy: true
    
    # Branch to deploy from
    branch: main
    
    # Build filters (optional)
    buildFilter:
      paths:
        - src/**
        - public/**
        - prisma/**
        - package*.json
        - next.config.js
        - tsconfig.json
    
    # Headers for the service
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block

